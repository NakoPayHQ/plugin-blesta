name: Release plugin-blesta

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No internal URLs
        run: bash ./scripts/check-no-internal-urls.sh ./
      - name: Build zip
        run: |
          cd .
          zip -r ../blesta.zip blesta -x '*/node_modules/*' '*/vendor/*' '*/.git/*'
      - name: GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: blesta.zip
          generate_release_notes: true
          name: Blesta ${{ github.ref_name }}
